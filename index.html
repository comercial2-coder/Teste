<script>
'use strict';

window.onerror = function(msg, url, line) {
  document.body.innerHTML = '<h2 style="color:red;padding:20px">Erro crítico: ' + msg + ' (linha ' + line + ')</h2>';
};

/* =========================
UTILS
========================= */

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function fmtNum(v){ return (v||0).toLocaleString('pt-BR'); }
function fmtBRL(v){ return 'R$ ' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2}); }

/* =========================
PROCESSAMENTO (MINIMO SEGURO)
========================= */

function processData(rows){

  if (!rows || rows.length < 2) throw new Error('Planilha vazia');

  let total = 0;

  rows.slice(1).forEach(r=>{
    try{
      let v = r[5];
      if(v){
        v = parseFloat(v.toString().replace(',', '.'));
        if(!isNaN(v)) total += v;
      }
    }catch(e){}
  });

  return {
    total,
    registros: rows.length - 1
  };
}

/* =========================
RENDER
========================= */

function renderDashboard(kpi){
  document.getElementById('dashboard').innerHTML = `
    <div style="padding:20px">
      <h2>Faturamento: ${fmtBRL(kpi.total)}</h2>
      <p>Registros: ${fmtNum(kpi.registros)}</p>
    </div>
  `;
}

/* =========================
LOAD
========================= */

function buildCSVUrl(raw){
  raw = raw.trim();

  if(raw.includes('output=csv')) return raw;

  const m = raw.match(/\/d\/([\w-]+)/);
  if(m){
    return `https://docs.google.com/spreadsheets/d/${m[1]}/pub?output=csv`;
  }

  return raw;
}

async function loadSheet(){

  const rawUrl = document.getElementById('sheets-url').value.trim();

  if(!rawUrl){
    showStatus('error','Cole a URL');
    return;
  }

  const url = buildCSVUrl(rawUrl);

  setLoading(true);
  showStatus('loading','Testando acesso...');

  try{

    const response = await fetch(url);

    if(!response.ok){
      throw new Error(`HTTP ${response.status}`);
    }

    const text = await response.text();

    if(!text || text.length < 10){
      throw new Error('CSV vazio');
    }

    showStatus('loading','Processando...');

    Papa.parse(text,{
      skipEmptyLines:true,

      complete:(res)=>{
        try{
          const kpi = processData(res.data);
          renderDashboard(kpi);
          showStatus('success','Carregado com sucesso');
        }catch(e){
          showStatus('error','Erro nos dados: '+e.message);
        }
        setLoading(false);
      },

      error:(err)=>{
        showStatus('error','Erro parse: '+err.message);
        setLoading(false);
      }
    });

  }catch(err){
    showStatus('error','Falha acesso: '+err.message);
    setLoading(false);
  }
}

/* =========================
UI
========================= */

function setLoading(on){
  const btn = document.getElementById('btn-load');
  if(btn) btn.disabled = on;
}

function showStatus(type,msg){
  const bar = document.getElementById('status-bar');
  const txt = document.getElementById('status-text');

  if(!bar || !txt) return;

  bar.className = 'status-bar show ' + type;
  txt.textContent = msg;
}

document.getElementById('sheets-url').addEventListener('keydown', e=>{
  if(e.key === 'Enter') loadSheet();
});

</script>
