<script>
'use strict';

function processData(rows) {
  if (!rows || rows.length < 2) throw new Error('Planilha sem dados suficientes.');

  const headers = rows[0].map(h => h ? h.toString().trim() : '');

  const warnings = [];

  function colIdx(fixedIdx, nameCandidates, label) {
    if (rows.length > 1 && rows[1][fixedIdx] !== undefined && rows[1][fixedIdx] !== '') {
      return fixedIdx;
    }

    for (const c of nameCandidates) {
      const i = headers.findIndex(h => h.toLowerCase().trim() === c.toLowerCase().trim());
      if (i >= 0) return i;
    }

    for (const c of nameCandidates) {
      const i = headers.findIndex(h => h.toLowerCase().includes(c.toLowerCase().substring(0, 5)));
      if (i >= 0) return i;
    }

    warnings.push(`Coluna não encontrada: ${label}`);
    return null; // NÃO força índice errado
  }

  const IDX = {
    cliente: colIdx(1, ['Cliente', 'Cód. Cliente'], 'Cliente'),
    nomeCliente: colIdx(2, ['Nome Cliente'], 'Nome Cliente'),
    situacao: colIdx(8, ['Situação', 'Status'], 'Situação'),
    total: 5,
    condicao: 12,
    dataPedido: 10,
    dataFinalizacao: colIdx(27, ['Data Finalização'], 'Data Finalização'),
    ultimaCompra: colIdx(53, ['Última Compra'], 'Última Compra'),
    nomeRepres: colIdx(6, ['Nome Repres.'], 'Representante'),
    nomeFant: colIdx(31, ['Nome Fant Repres.'], 'Fantasia Rep'),
    cidade: colIdx(13, ['Cidade'], 'Cidade'),
    uf: colIdx(29, ['UF'], 'UF'),
    tipoMovimento: colIdx(64, ['Tipo Movimento'], 'Tipo Movimento'),
    qtdItens: colIdx(52, ['Qtd Itens'], 'Qtd Itens'),
    pesoLiq: colIdx(24, ['Peso Liq'], 'Peso Líquido'),
  };

  const data = rows.slice(1).filter(r => r && r.some(v => v));

  const gS = (row, idx) => (idx !== null && row[idx]) ? row[idx].toString().trim() : '';
  const gN = (row, idx) => {
    if (idx === null) return 0;
    const v = row[idx];
    if (!v) return 0;
    return parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0;
  };

  const isCancelado = r => gS(r, IDX.situacao).toLowerCase().includes('cancelad');
  const isAcrescentar = r => gS(r, IDX.condicao).toUpperCase().startsWith('ACRESCENTAR');

  const validos = data.filter(r => !isCancelado(r));
  const pedidosUnicos = validos.filter(r => !isAcrescentar(r));

  const faturamentoTotal = validos.reduce((s, r) => s + gN(r, IDX.total), 0);

  const totalPorCliente = {};
  validos.forEach(r => {
    const cli = gS(r, IDX.cliente) || gS(r, IDX.nomeCliente);
    if (!cli) return;
    totalPorCliente[cli] = (totalPorCliente[cli] || 0) + gN(r, IDX.total);
  });

  const clientesComVenda = Object.keys(totalPorCliente).length;
  const ticketMedio = clientesComVenda ? faturamentoTotal / clientesComVenda : 0;

  return {
    faturamentoTotal,
    ticketMedio,
    totalVendas: pedidosUnicos.length,
    clientesComVenda,
    warnings
  };
}

async function loadSheet() {
  const rawUrl = document.getElementById('sheets-url').value.trim();
  if (!rawUrl) {
    showStatus('error', 'Cole a URL.');
    return;
  }

  const url = buildCSVUrl(rawUrl);

  setLoading(true);
  showStatus('loading', 'Carregando...');

  Papa.parse(url, {
    download: true,
    skipEmptyLines: true,
    complete: (results) => {
      try {
        console.log('HEADERS:', results.data[0]);

        const kpi = processData(results.data);

        renderDashboard(kpi);

        if (kpi.warnings.length > 0) {
          showStatus('error', '⚠️ Problemas encontrados: ' + kpi.warnings.join(' | '));
        } else {
          showStatus('success', 'Dados carregados com sucesso');
        }

      } catch (err) {
        showStatus('error', 'Erro real: ' + err.message);
      }

      setLoading(false);
    },
    error: (err) => {
      showStatus('error', 'Erro ao acessar planilha: ' + err.message);
      setLoading(false);
    }
  });
}
</script>
