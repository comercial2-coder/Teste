<script>
'use strict';

/* =========================
ANTI TELA BRANCA
========================= */

window.addEventListener('error', function(e){
  document.body.innerHTML = `
    <div style="padding:30px;font-family:Arial">
      <h2 style="color:red">Erro crítico no sistema</h2>
      <p><strong>Mensagem:</strong> ${e.message}</p>
      <p><strong>Linha:</strong> ${e.lineno}</p>
    </div>
  `;
});

/* =========================
SAFE HELPERS
========================= */

function safeGet(id){
  return document.getElementById(id) || null;
}

function showStatus(type,msg){
  const bar = safeGet('status-bar');
  const txt = safeGet('status-text');

  if(!bar || !txt) return;

  bar.className = 'status-bar show ' + type;
  txt.textContent = msg;
}

function setLoading(on){
  const btn = safeGet('btn-load');
  if(btn) btn.disabled = on;
}

/* =========================
UTILS
========================= */

function buildCSVUrl(raw){
  if(!raw) return '';

  raw = raw.trim();

  if(raw.includes('output=csv')) return raw;

  const m = raw.match(/\/d\/([\w-]+)/);
  if(m){
    return `https://docs.google.com/spreadsheets/d/${m[1]}/pub?output=csv`;
  }

  return raw;
}

/* =========================
PROCESSAMENTO SUPER SEGURO
========================= */

function processData(rows){

  if(!rows || rows.length < 2){
    return { total:0, registros:0 };
  }

  let total = 0;

  for(let i=1;i<rows.length;i++){
    try{
      let v = rows[i][5];

      if(v){
        v = parseFloat(v.toString().replace(',', '.'));
        if(!isNaN(v)) total += v;
      }
    }catch(e){
      console.warn('Erro linha', i);
    }
  }

  return {
    total,
    registros: rows.length - 1
  };
}

/* =========================
RENDER
========================= */

function renderDashboard(kpi){

  const dash = safeGet('dashboard');
  if(!dash) return;

  dash.innerHTML = `
    <div style="padding:20px">
      <h2>Faturamento: R$ ${kpi.total.toFixed(2)}</h2>
      <p>Registros: ${kpi.registros}</p>
    </div>
  `;
}

/* =========================
LOAD
========================= */

async function loadSheet(){

  const input = safeGet('sheets-url');

  if(!input){
    alert('Campo URL não encontrado');
    return;
  }

  const rawUrl = input.value.trim();

  if(!rawUrl){
    showStatus('error','Cole a URL');
    return;
  }

  const url = buildCSVUrl(rawUrl);

  setLoading(true);
  showStatus('loading','Conectando...');

  try{

    const res = await fetch(url);

    if(!res.ok){
      throw new Error('HTTP ' + res.status);
    }

    const text = await res.text();

    if(!text || text.length < 5){
      throw new Error('CSV vazio');
    }

    Papa.parse(text,{
      skipEmptyLines:true,

      complete:(result)=>{
        try{
          const kpi = processData(result.data);
          renderDashboard(kpi);
          showStatus('success','OK carregado');
        }catch(e){
          showStatus('error','Erro dados: '+e.message);
        }
        setLoading(false);
      },

      error:(err)=>{
        showStatus('error','Erro parse: '+err.message);
        setLoading(false);
      }
    });

  }catch(err){
    showStatus('error','Erro acesso: '+err.message);
    setLoading(false);
  }
}

/* =========================
INIT SAFE
========================= */

document.addEventListener('DOMContentLoaded', function(){

  const input = safeGet('sheets-url');

  if(input){
    input.addEventListener('keydown', function(e){
      if(e.key === 'Enter') loadSheet();
    });
  }

});

</script>
