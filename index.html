<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visão Geral Comercial</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
input { width:70%; padding:10px; }
button { padding:10px 20px; cursor:pointer; }
#status { margin-top:15px; font-weight:bold; }
</style>
</head>

<body>

<h2>Dashboard Comercial</h2>

<input id="sheets-url" placeholder="Cole a URL do Google Sheets (CSV)">
<button onclick="loadSheet()">Carregar</button>

<div id="status"></div>
<div id="dashboard"></div>

<script>

function showStatus(msg, type='black'){
  const el = document.getElementById('status');
  el.style.color = type;
  el.innerText = msg;
}

function buildCSVUrl(raw){
  raw = raw.trim();

  if(raw.includes('output=csv')) return raw;

  const m = raw.match(/\/d\/([\w-]+)/);
  if(m){
    return `https://docs.google.com/spreadsheets/d/${m[1]}/pub?output=csv`;
  }

  return raw;
}

function parseDate(str){
  if(!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function processData(rows){
  if(!rows || rows.length < 2) throw new Error('Sem dados');

  const data = rows.slice(1);

  let total = 0;

  data.forEach(r=>{
    const val = parseFloat((r[5] || "0").replace(",", "."));
    if(!isNaN(val)) total += val;
  });

  return {
    total,
    registros: data.length
  };
}

function renderDashboard(kpi){
  document.getElementById('dashboard').innerHTML =
    `<h3>Faturamento: R$ ${kpi.total.toFixed(2)}</h3>
     <p>Registros: ${kpi.registros}</p>`;
}

async function loadSheet(){

  const raw = document.getElementById('sheets-url').value;

  if(!raw){
    showStatus('Cole a URL', 'red');
    return;
  }

  const url = buildCSVUrl(raw);

  showStatus('Testando acesso...', 'blue');

  try{

    const response = await fetch(url);

    if(!response.ok){
      throw new Error(`HTTP ${response.status}`);
    }

    const text = await response.text();

    if(!text || text.length < 10){
      throw new Error('CSV vazio ou inválido');
    }

    showStatus('Processando...', 'blue');

    Papa.parse(text, {
      skipEmptyLines:true,
      complete:(res)=>{
        try{
          const kpi = processData(res.data);
          renderDashboard(kpi);
          showStatus('OK carregado com sucesso', 'green');
        }catch(e){
          showStatus('Erro nos dados: ' + e.message, 'red');
        }
      },
      error:(err)=>{
        showStatus('Erro no parse: ' + err.message, 'red');
      }
    });

  }catch(err){
    showStatus(
      'Falha ao acessar: ' + err.message + 
      ' | Verifique publicação ou bloqueio Google',
      'red'
    );
  }
}

</script>

</body>
</html>
